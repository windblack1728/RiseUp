<!doctype HTML>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='styles/styles.css') }}">

        <title>App</title>
    </head>
    <body>
        <header class="p-3 bg-dark text-white">
            <div class="container">
                <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                    <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
                        RiseUp
                    </a>

                    <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                        <li><a href="/home" class="nav-link px-2 text-secondary">Home</a></li>
                        <li><a href="/form" class="nav-link px-2 text-white">New entry</a></li>
                        <li><a href="/ref" class="nav-link px-2 text-white">References</a></li>
                        <li><a href="/about" class="nav-link px-2 text-white">About</a></li>
                    </ul>

                    <div class="text-end">
                        <button type="button" class="btn btn-outline-light me-2">Login</button>
                        <button type="button" class="btn btn-warning">Sign-up</button>
                    </div>
                </div>
            </div>
        </header>

        <h1>Date / height</h1>
        <form method="post" enctype="multipart/form-data" class="login_form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="form-control" id="name" name="name" required="required">
            </div>

            <div class="form-group">
                <label>Date of birth</label>
                <input type="date" class="form-control" id="date" name="date" required="required">
            </div>
            <div class="form-group">
                <label>Height (in cm)</label>
                <input type="number" class="form-control" id="height" name="height" required="required">
            </div>
            <div class="form-group">
                <label for="gender-select">Gender: </label>
                <select name="gender" id="gender" class="form-control">
                    <option disabled selected value> -- select an option -- </option>
                    <option value="male">Male</option>  
                    <option value="female">Female</option>  
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </body>
</html>
