{% extends 'base.html' %}
{% block title %}Log in — RiseUp{% endblock %}
{% block nav_login %}active{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <h2 class="fw-bold mb-4">Log in</h2>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" value="{{ email }}" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Log in</button>
                </form>
            </div>
        </div>
        <p class="text-center text-muted mt-3 small">
            Don't have an account? <a href="/register">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
