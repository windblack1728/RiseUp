{% extends 'base.html' %}
{% block title %}Result — RiseUp{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm text-center p-4">
            <h2 class="fw-bold mb-1">{{ name }}</h2>
            <p class="text-muted mb-4">Height: {{ height }} cm</p>

            <div class="display-6 fw-bold text-warning mb-2">{{ percentile }}</div>
            <p class="text-muted">WHO height-for-age percentile</p>

            <div class="d-flex gap-2 justify-content-center mt-3">
                <a href="/child/{{ child_id }}" class="btn btn-outline-dark">View history</a>
                <a href="/form" class="btn btn-warning">Add another child</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
