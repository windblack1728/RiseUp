<!doctype HTML>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
            integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHy"
            crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='css/style.css')}}">
        <title>Пример загрузки файла</title>
    </head>
    <body>
        <h1>Форма для регистрации в суперсекретной системе</h1>
        <form method="post" enctype="multipart/form-data">
            <div class="form-group">
                <input type="email" class="form-control" id="email" name="email" placeholder="Введите адрес почты">
            </div>
            <div class="form-group">
                <input type="password" class="form-control" id="password" name="password" placeholder="Введите пароль">
            </div>
            <div class="form-group">
                <label for="class_number">В каком вы классе</label>
                <select class="form-control" id="class_number" name="class_number">
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                </select>
            </div>
            <div class="form-group">
                <label for="about">Немного о себе</label>
                <textarea class="form-control" id="about" name="about" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="photo">Приложите фотографию</label>
                <input type="file" class="form-control-file" id="photo" name="file">
            </div>
            <div class="form-group">
                <label>Укажите пол</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                    <label class="form-check-label" for="male">Мужской</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                    <label class="form-check-label" for="female">Женский</label>
                </div>
            </div>
            <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="volunteer" name="volunteer">
                <label class="form-check-label" for="volunteer">Готов быть добровольцем</label>
            </div>
            <button type="submit" class="btn btn-primary">Записаться</button>
        </form>
    </body>
</html>
